<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu primeiro Widget</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
            text-align:center;
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:8px;
            background:#4F46E5;
            color:white;
            cursor:pointer;
        }
    </style>

</head>
<body>

<div class="card">
    <h1>Olá, Heloíse! 👋</h1>
    <p>Meu primeiro widget para o Notion.</p>

    <button onclick="alert('Funcionou! 🎉')">
        Clique aqui
    </button>
</div>

</body>
</html>
